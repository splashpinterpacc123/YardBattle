name: Build YardBattle APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Prepare Project
        run: |
          rm -rf jni
          mkdir -p jni/src
          mkdir -p assets
          cp main.cxx jni/src/main.cpp
          # Авто-исправление путей в коде
          sed -i 's|<SDL2/SDL.h>|"SDL.h"|g' jni/src/main.cpp
          sed -i 's|<SDL2/SDL_image.h>|"SDL_image.h"|g' jni/src/main.cpp
          sed -i 's|<SDL2/SDL_mixer.h>|"SDL_mixer.h"|g' jni/src/main.cpp
          sed -i 's|<SDL2/SDL_ttf.h>|"SDL_ttf.h"|g' jni/src/main.cpp
          cp ресурсы/* assets/ 2>/dev/null || true

      - name: Download SDL2
        run: |
          cd jni
          wget -q https://www.libsdl.org/release/SDL2-2.28.5.tar.gz && tar -xf SDL2-2.28.5.tar.gz && mv SDL2-2.28.5 SDL2
          wget -q https://www.libsdl.org/projects/SDL_image/release/SDL2_image-2.8.2.tar.gz && tar -xf SDL2_image-2.8.2.tar.gz && mv SDL2_image-2.8.2 SDL2_image
          wget -q https://www.libsdl.org/projects/SDL_mixer/release/SDL2_mixer-2.8.0.tar.gz && tar -xf SDL2_mixer-2.8.0.tar.gz && mv SDL2_mixer-2.8.0 SDL2_mixer
          wget -q https://www.libsdl.org/projects/SDL_ttf/release/SDL2_ttf-2.22.0.tar.gz && tar -xf SDL2_ttf-2.22.0.tar.gz && mv SDL2_ttf-2.22.0 SDL2_ttf

      - name: Create Android.mk
        run: |
          cat <<EOF > jni/Android.mk
          LOCAL_PATH := \$(call my-dir)

          # Подключаем библиотеки SDL2 из их собственных файлов
          include \$(LOCAL_PATH)/SDL2/Android.mk
          include \$(LOCAL_PATH)/SDL2_image/Android.mk
          include \$(LOCAL_PATH)/SDL2_mixer/Android.mk
          include \$(LOCAL_PATH)/SDL2_ttf/Android.mk

          # Собираем твою игру
          include \$(CLEAR_VARS)
          LOCAL_MODULE := main
          LOCAL_SRC_FILES := src/main.cpp
          LOCAL_C_INCLUDES := \$(LOCAL_PATH)/SDL2/include \$(LOCAL_PATH)/SDL2_image \$(LOCAL_PATH)/SDL2_mixer \$(LOCAL_PATH)/SDL2_ttf
          LOCAL_SHARED_LIBRARIES := SDL2 SDL2_image SDL2_mixer SDL2_ttf
          LOCAL_LDLIBS := -llog -lGLESv2
          include \$(BUILD_SHARED_LIBRARY)
          EOF

      - name: Build
        run: |
          ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk APP_PLATFORM=android-21 APP_ABI=arm64-v8a
