name: Build YardBattle APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Setup Project Structure
        run: |
          mkdir -p jni/src
          mkdir -p assets
          cp main.cxx jni/src/main.cpp
          # Копируем только твой Android.mk, не меняя его
          cp Android.mk jni/Android.mk
          cp Application.mk jni/Application.mk
          # Создаем манифест
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.splash.yardbattle"><uses-sdk android:minSdkVersion="21" /><application android:hasCode="false"><activity android:name="org.libsdl.app.SDLActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > AndroidManifest.xml
          cp ресурсы/* assets/ 2>/dev/null || true

      - name: Download SDL2 Libraries
        run: |
          # Качаем библиотеки в корень, чтобы NDK_MODULE_PATH их подхватил отдельно от jni
          mkdir -p external_libs
          cd external_libs
          wget -q https://www.libsdl.org/release/SDL2-2.28.5.tar.gz && tar -xf SDL2-2.28.5.tar.gz && mv SDL2-2.28.5 SDL2
          wget -q https://www.libsdl.org/projects/SDL_image/release/SDL2_image-2.8.2.tar.gz && tar -xf SDL2_image-2.8.2.tar.gz && mv SDL2_image-2.8.2 SDL2_image
          wget -q https://www.libsdl.org/projects/SDL_mixer/release/SDL2_mixer-2.8.0.tar.gz && tar -xf SDL2_mixer-2.8.0.tar.gz && mv SDL2_mixer-2.8.0 SDL2_mixer
          wget -q https://www.libsdl.org/projects/SDL_ttf/release/SDL2_ttf-2.22.0.tar.gz && tar -xf SDL2_ttf-2.22.0.tar.gz && mv SDL2_ttf-2.22.0 SDL2_ttf

      - name: Build with ndk-build
        run: |
          # Мы указываем NDK_MODULE_PATH на внешнюю папку, чтобы не было дублей в jni
          ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_MODULE_PATH=./external_libs \
            APP_PLATFORM=android-21 \
            APP_ALLOW_MISSING_DEPS=true
