name: Build YardBattle APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Setup Project Structure
        run: |
          mkdir -p jni/src
          mkdir -p assets
          cp main.cxx jni/src/main.cpp
          # Копируем картинки из твоей папки "ресурсы" в assets
          cp ресурсы/* assets/ 2>/dev/null || true

      - name: Download SDL2 Libraries
        run: |
          cd jni
          wget -q https://www.libsdl.org/release/SDL2-2.28.5.tar.gz && tar -xf SDL2-2.28.5.tar.gz && mv SDL2-2.28.5 SDL2
          wget -q https://www.libsdl.org/projects/SDL_image/release/SDL2_image-2.8.2.tar.gz && tar -xf SDL2_image-2.8.2.tar.gz && mv SDL2_image-2.8.2 SDL2_image
          wget -q https://www.libsdl.org/projects/SDL_mixer/release/SDL2_mixer-2.8.0.tar.gz && tar -xf SDL2_mixer-2.8.0.tar.gz && mv SDL2_mixer-2.8.0 SDL2_mixer
          wget -q https://www.libsdl.org/projects/SDL_ttf/release/SDL2_ttf-2.22.0.tar.gz && tar -xf SDL2_ttf-2.22.0.tar.gz && mv SDL2_ttf-2.22.0 SDL2_ttf

      - name: Generate Fresh Android.mk
        run: |
          # Мы создаем идеальный Android.mk с нуля, игнорируя старые ошибки
          echo 'LOCAL_PATH := $(call my-dir)' > jni/Android.mk
          echo 'include $(CLEAR_VARS)' >> jni/Android.mk
          echo 'LOCAL_MODULE := main' >> jni/Android.mk
          echo 'LOCAL_SRC_FILES := src/main.cpp' >> jni/Android.mk
          echo 'LOCAL_SHARED_LIBRARIES := SDL2 SDL2_image SDL2_mixer SDL2_ttf' >> jni/Android.mk
          echo 'LOCAL_LDLIBS := -llog -lGLESv2' >> jni/Android.mk
          echo 'include $(BUILD_SHARED_LIBRARY)' >> jni/Android.mk
          # Добавляем импорт скачанных модулей
          echo '$(call import-add-path, $(LOCAL_PATH))' >> jni/Android.mk
          echo '$(include jni/SDL2/Android.mk)' >> jni/Android.mk
          echo '$(include jni/SDL2_image/Android.mk)' >> jni/Android.mk
          echo '$(include jni/SDL2_mixer/Android.mk)' >> jni/Android.mk
          echo '$(include jni/SDL2_ttf/Android.mk)' >> jni/Android.mk

      - name: Build with ndk-build
        run: |
          # Указываем NDK_MODULE_PATH прямо на папку jni
          ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_MODULE_PATH=./jni \
            APP_PLATFORM=android-21 \
            APP_ALLOW_MISSING_DEPS=true
