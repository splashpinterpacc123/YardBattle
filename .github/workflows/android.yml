name: Build YardBattle APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Download SDL2 Libraries
        run: |
          mkdir jni
          cd jni
          # Скачиваем библиотеки, чтобы тебе не грузить их вручную
          wget -q https://www.libsdl.org/release/SDL2-2.28.5.tar.gz && tar -xf SDL2-2.28.5.tar.gz && mv SDL2-2.28.5 SDL2
          wget -q https://www.libsdl.org/projects/SDL_image/release/SDL2_image-2.8.2.tar.gz && tar -xf SDL2_image-2.8.2.tar.gz && mv SDL2_image-2.8.2 SDL2_image
          wget -q https://www.libsdl.org/projects/SDL_mixer/release/SDL2_mixer-2.8.0.tar.gz && tar -xf SDL2_mixer-2.8.0.tar.gz && mv SDL2_mixer-2.8.0 SDL2_mixer
          wget -q https://www.libsdl.org/projects/SDL_ttf/release/SDL2_ttf-2.22.0.tar.gz && tar -xf SDL2_ttf-2.22.0.tar.gz && mv SDL2_ttf-2.22.0 SDL2_ttf

      - name: Prepare Assets and Source
        run: |
          mkdir -p proj/app/src/main/jni/src
          mkdir -p proj/app/src/main/assets
          # Копируем код
          cp main.cxx proj/app/src/main/jni/src/main.cpp
          # Копируем файлы из твоей папки "ресурсы" в папку assets для Android
          cp ресурсы/* proj/app/src/main/assets/ 2>/dev/null || true
          # Копируем конфиги
          cp Android.mk proj/app/src/main/jni/
          cp Application.mk proj/app/src/main/jni/
          cp AndroidManifest.xml proj/app/src/main/

      - name: Build with ndk-build
        run: |
          cd proj/app/src/main/jni
          ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YardBattle-Binary
          path: proj/app/src/main/libs/**/*
